name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      # Project ID is not secret — Variables or Secrets both work.
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}
      GCP_SERVICE_NAME: middleeastwar
      GCP_REGION: us-central1
      # GOOGLE_CLIENT_ID and SESSION_SECRET are only injected on the "Deploy" step (repository Secrets).
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate required secrets
        run: |
          missing=""
          # GCP_SA_KEY is only in secrets.* context (not copied to env — avoids huge env).
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then missing="${missing} GCP_SA_KEY"; fi
          if [ -z "${GCP_PROJECT_ID}" ]; then missing="${missing} GCP_PROJECT_ID"; fi
          if [ -z "${{ secrets.GOOGLE_CLIENT_ID }}" ]; then missing="${missing} GOOGLE_CLIENT_ID"; fi
          if [ -z "${{ secrets.SESSION_SECRET }}" ]; then missing="${missing} SESSION_SECRET"; fi
          if [ -n "${missing}" ]; then
            echo "Deploy is missing configuration. Open this repo on GitHub:"
            echo "  Settings → Secrets and variables → Actions"
            echo ""
            echo "Required repository SECRETS: GCP_SA_KEY, SESSION_SECRET, GOOGLE_CLIENT_ID"
            echo "  (GOOGLE_CLIENT_ID = Web client *.apps.googleusercontent.com from GCP → Credentials)"
            echo "Required repository VARIABLE or SECRET: GCP_PROJECT_ID"
            echo ""
            echo "If you created Environment secrets, add to the deploy job:  environment: <that-environment-name>"
            echo ""
            echo "Missing right now:"
            echo "${missing}" | tr ' ' '\n' | sed '/^$/d' | sort -u
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Debug gcloud environment
        run: |
          set -x
          echo "Repo: ${GITHUB_REPOSITORY}"
          echo "Branch: ${GITHUB_REF}"
          echo "Actor: ${GITHUB_ACTOR}"
          echo "Project from env: ${GCP_PROJECT_ID}"
          echo "Service from env: ${GCP_SERVICE_NAME}"
          echo "Region from env: ${GCP_REGION}"
          gcloud --version
          gcloud auth list
          gcloud config list
          # Do not fail deploy diagnostics when Cloud Resource Manager API is disabled.
          gcloud projects describe "${GCP_PROJECT_ID}" --format="value(projectId,projectNumber)" || true

      - name: Deploy to Cloud Run
        env:
          # Repository Secrets — read here so sync-to-gcloud.sh receives the exact values (not job-wide env).
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}
          GCP_SERVICE_NAME: middleeastwar
          GCP_REGION: us-central1
        run: bash scripts/sync-to-gcloud.sh

