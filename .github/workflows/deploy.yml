name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_SERVICE_NAME: middleeastwar
      GCP_REGION: us-central1
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "Missing GitHub secret: GCP_SA_KEY"
            exit 1
          fi
          if [ -z "${GCP_PROJECT_ID}" ]; then
            echo "Missing GitHub secret: GCP_PROJECT_ID"
            exit 1
          fi
          if [ -z "${GOOGLE_CLIENT_ID}" ]; then
            echo "Missing GitHub secret: GOOGLE_CLIENT_ID"
            exit 1
          fi
          if [ -z "${SESSION_SECRET}" ]; then
            echo "Missing GitHub secret: SESSION_SECRET"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Debug gcloud environment
        run: |
          set -x
          echo "Repo: ${GITHUB_REPOSITORY}"
          echo "Branch: ${GITHUB_REF}"
          echo "Actor: ${GITHUB_ACTOR}"
          echo "Project from env: ${GCP_PROJECT_ID}"
          echo "Service from env: ${GCP_SERVICE_NAME}"
          echo "Region from env: ${GCP_REGION}"
          gcloud --version
          gcloud auth list
          gcloud config list
          # Do not fail deploy diagnostics when Cloud Resource Manager API is disabled.
          gcloud projects describe "${GCP_PROJECT_ID}" --format="value(projectId,projectNumber)" || true

      - name: Deploy to Cloud Run
        run: |
          set -x
          bash -x scripts/sync-to-gcloud.sh

