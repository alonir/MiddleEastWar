name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      # Project ID is not secret — Variables or Secrets both work.
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}
      GCP_SERVICE_NAME: middleeastwar
      GCP_REGION: us-central1
      # OAuth Web Client ID is public in the browser; use a Repository *variable* or *secret*.
      GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID || secrets.GOOGLE_CLIENT_ID }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate required secrets
        run: |
          missing=""
          # GCP_SA_KEY is only in secrets.* context (not copied to env — avoids huge env).
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then missing="${missing} GCP_SA_KEY"; fi
          if [ -z "${GCP_PROJECT_ID}" ]; then missing="${missing} GCP_PROJECT_ID"; fi
          if [ -z "${GOOGLE_CLIENT_ID}" ]; then missing="${missing} GOOGLE_CLIENT_ID"; fi
          if [ -z "${SESSION_SECRET}" ]; then missing="${missing} SESSION_SECRET"; fi
          if [ -n "${missing}" ]; then
            echo "Deploy is missing configuration. Open this repo on GitHub:"
            echo "  Settings → Secrets and variables → Actions"
            echo ""
            echo "Required repository SECRET: GCP_SA_KEY (JSON key — never use the Variables tab for this)"
            echo "Required repository SECRET: SESSION_SECRET"
            echo "Required repository VARIABLE or SECRET: GCP_PROJECT_ID, GOOGLE_CLIENT_ID"
            echo "  (easiest: Variables → New repository variable → GOOGLE_CLIENT_ID = your *.apps.googleusercontent.com)"
            echo ""
            echo "If you created Environment secrets, add to the deploy job:  environment: <that-environment-name>"
            echo ""
            echo "Missing right now:"
            echo "${missing}" | tr ' ' '\n' | sed '/^$/d' | sort -u
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Debug gcloud environment
        run: |
          set -x
          echo "Repo: ${GITHUB_REPOSITORY}"
          echo "Branch: ${GITHUB_REF}"
          echo "Actor: ${GITHUB_ACTOR}"
          echo "Project from env: ${GCP_PROJECT_ID}"
          echo "Service from env: ${GCP_SERVICE_NAME}"
          echo "Region from env: ${GCP_REGION}"
          gcloud --version
          gcloud auth list
          gcloud config list
          # Do not fail deploy diagnostics when Cloud Resource Manager API is disabled.
          gcloud projects describe "${GCP_PROJECT_ID}" --format="value(projectId,projectNumber)" || true

      - name: Deploy to Cloud Run
        run: |
          set -x
          bash -x scripts/sync-to-gcloud.sh

